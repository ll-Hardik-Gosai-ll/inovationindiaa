<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Innovationindiaa - Coming Soon</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B35;
            --secondary: #004E89;
            --accent: #F7B801;
            --dark: #0F1419;
            --light: #F5F7FA;
            --text: #1A1A1A;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #1a2a4a 100%);
            color: var(--text);
            position: relative;
        }

        /* Animated background elements */
        .bg-decoration {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            overflow: hidden;
        }

        .blob {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            mix-blend-mode: screen;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            top: -100px;
            right: -100px;
            animation: float 8s ease-in-out infinite;
        }

        .blob-2 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, var(--secondary), var(--primary));
            bottom: -50px;
            left: 10%;
            animation: float 10s ease-in-out infinite 2s;
        }

        .blob-3 {
            width: 250px;
            height: 250px;
            background: linear-gradient(135deg, var(--accent), var(--secondary));
            top: 50%;
            right: 5%;
            animation: float 9s ease-in-out infinite 1s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Grid lines */
        .grid-lines {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 107, 53, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 107, 53, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Main content */
        .container {
            position: relative;
            z-index: 1;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .content {
            max-width: 800px;
            text-align: center;
            animation: fadeInUp 1s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            font-size: 24px;
            font-weight: 800;
            margin-bottom: 60px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: fadeInDown 0.8s ease-out;
        }

        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .main-title {
            font-size: clamp(2.5rem, 8vw, 4rem);
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 20px;
            color: var(--light);
            letter-spacing: -1px;
            animation: fadeInUp 1s ease-out 0.2s both;
        }

        .highlight {
            background: linear-gradient(120deg, var(--primary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: clamp(1rem, 3vw, 1.25rem);
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 50px;
            font-weight: 300;
            line-height: 1.6;
            animation: fadeInUp 1s ease-out 0.4s both;
        }

        /* Form section */
        .form-container {
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.6s both;
        }

        .form-wrapper {
            display: flex;
            gap: 8px;
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 50px;
            border: 1px solid rgba(255, 107, 53, 0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .form-wrapper:hover {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 8px 32px rgba(255, 107, 53, 0.15);
        }

        .form-wrapper input {
            flex: 1;
            padding: 12px 20px;
            border: none;
            background: transparent;
            color: var(--light);
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            outline: none;
        }

        .form-wrapper input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .submit-btn {
            padding: 12px 30px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
            white-space: nowrap;
            letter-spacing: 0.5px;
        }

        .submit-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 24px rgba(255, 107, 53, 0.4);
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .form-message {
            margin-top: 12px;
            font-size: 13px;
            color: rgba(255, 255, 255, 0.6);
        }

        .success-message {
            color: var(--accent);
            font-weight: 600;
            display: none;
        }

        /* Social links */
        .social-links {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 50px;
            animation: fadeInUp 1s ease-out 0.8s both;
        }

        .social-link {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid rgba(255, 107, 53, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            text-decoration: none;
            transition: all 0.3s ease;
            font-size: 20px;
        }

        .social-link:hover {
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: white;
            border-color: var(--primary);
            transform: translateY(-5px);
            box-shadow: 0 12px 24px rgba(255, 107, 53, 0.3);
        }

        /* Counter section */
        .counter-section {
            margin-top: 60px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 107, 53, 0.2);
            animation: fadeInUp 1s ease-out 1s both;
        }

        .counter-label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.5);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .countdown {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 15px;
            max-width: 400px;
            margin: 0 auto;
        }

        .countdown-item {
            background: rgba(255, 107, 53, 0.1);
            border: 1px solid rgba(255, 107, 53, 0.3);
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s ease;
        }

        .countdown-item:hover {
            border-color: var(--primary);
            background: rgba(255, 107, 53, 0.15);
            transform: translateY(-5px);
        }

        .countdown-number {
            font-size: 28px;
            font-weight: 700;
            color: var(--accent);
            line-height: 1;
        }

        .countdown-label {
            font-size: 11px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
            letter-spacing: 1px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .form-wrapper {
                flex-direction: column;
            }

            .main-title {
                font-size: 2rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            .countdown {
                grid-template-columns: repeat(2, 1fr);
                gap: 10px;
            }

            .countdown-item {
                padding: 12px;
            }

            .countdown-number {
                font-size: 22px;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }
    </style>
</head>
<body>
    <div class="bg-decoration">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="grid-lines"></div>
    </div>

    <div class="container">
        <div class="content">
            <div class="logo">⚡ INOVATIONINDIAA</div>
            
            <h1 class="main-title">
                Something <span class="highlight">Extraordinary</span><br>
                is Coming
            </h1>
            
            <p class="subtitle">
                We're building the future of innovation in India. Get early access and be the first to discover what we're creating.
            </p>

            <div class="form-container">
                <form class="form-wrapper" id="emailForm">
                    <input 
                        type="email" 
                        placeholder="Enter your email address" 
                        required
                        id="emailInput"
                    >
                    <button type="submit" class="submit-btn">Notify Me</button>
                </form>
                <p class="form-message">
                    <span class="success-message" id="successMsg">✓ Thanks! We'll notify you soon</span>
                </p>
            </div>

            <!-- <div class="social-links"> -->
                <!-- <a href="#" class="social-link" title="Twitter">𝕏</a> -->
                <!-- <a href="#" class="social-link" title="LinkedIn">in</a> -->
                <!-- <a href="#" class="social-link" title="Instagram">📷</a> -->
            <!-- </div> -->

            <div class="counter-section">
                <p class="counter-label">Launching In</p>
                <div class="countdown" id="countdown">
                    <div class="countdown-item">
                        <div class="countdown-number" id="days">00</div>
                        <div class="countdown-label">Days</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-number" id="hours">00</div>
                        <div class="countdown-label">Hours</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-number" id="minutes">00</div>
                        <div class="countdown-label">Minutes</div>
                    </div>
                    <div class="countdown-item">
                        <div class="countdown-number" id="seconds">00</div>
                        <div class="countdown-label">Seconds</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Countdown timer
        function updateCountdown() {
            // Set your launch date here (change this to your actual launch date)
            const launchDate = new Date('2026-07-01T23:59:59').getTime();
            
            const timer = setInterval(() => {
                const now = new Date().getTime();
                const distance = launchDate - now;

                const days = Math.floor(distance / (1000 * 60 * 60 * 24));
                const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((distance % (1000 * 60)) / 1000);

                document.getElementById('days').textContent = String(days).padStart(2, '0');
                document.getElementById('hours').textContent = String(hours).padStart(2, '0');
                document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
                document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');

                if (distance < 0) {
                    clearInterval(timer);
                    document.getElementById('countdown').innerHTML = '<p style="color: var(--accent); font-size: 24px; font-weight: 700;">🎉 We\'re Live!</p>';
                }
            }, 1000);
        }

        // Email form submission
        document.getElementById('emailForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const emailInput = document.getElementById('emailInput');
            const successMsg = document.getElementById('successMsg');
            
            // Here you would send the email to your backend
            console.log('Email submitted:', emailInput.value);
            
            // Show success message
            successMsg.style.display = 'inline';
            
            // Reset form
            emailInput.value = '';
            
            // Hide message after 3 seconds
            setTimeout(() => {
                successMsg.style.display = 'none';
            }, 3000);
        });

        // Initialize countdown on page load
        updateCountdown();

        // Add smooth scroll behavior
        document.documentElement.style.scrollBehavior = 'smooth';
    </script>
</body>
</html>
